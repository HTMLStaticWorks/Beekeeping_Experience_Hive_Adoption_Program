<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Login | BeeHive Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body, main {
            background-color: white !important;
            color: #3D2B1F !important;
        }
        .dark body, .dark main {
            background-color: #09090b !important;
            color: #f3f4f6 !important;
        }
        .glass-card {
            background-color: white !important;
            border-color: #f3f4f6 !important;
        }
        .dark .glass-card {
            background-color: rgba(24, 24, 27, 0.8) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(12px);
        }
        input, select {
            background-color: #f9fafb !important; /* gray-50 */
            color: #3D2B1F !important;
            border: 1px solid #e5e7eb !important;
        }
        .dark input, .dark select {
            background-color: #18181b !important; /* zinc-900 */
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
        .text-honey-gold {
            color: #D4A017 !important;
        }
        .fill-honey-gold\/20 {
            fill: rgba(212, 160, 23, 0.2) !important;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'honey-gold': '#D4A017',
                        'forest-green': '#1A3A3A',
                        'soft-amber': '#FFBF00',
                        'warm-beige': '#F5F5DC',
                        'dark-brown': '#3D2B1F',
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col min-h-screen">
    
    <!-- Minimal Navbar -->
    <nav class="p-8 max-w-7xl mx-auto w-full flex items-center justify-between">
        <div class="flex-1"></div>
        <div class="flex-1 flex justify-end items-center gap-4">
            <button id="theme-toggle" class="p-2 hover:bg-honey-gold/10 rounded-full transition-all duration-300 hover:scale-110 active:scale-95 text-dark-brown dark:text-gray-100">
                <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
            </button>
            <button id="rtl-toggle" class="p-2 hover:bg-honey-gold/10 rounded-full transition-all duration-300 text-xs font-bold hover:scale-110 active:scale-95 text-dark-brown dark:text-gray-100">RTL</button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="max-w-md w-full">
            <div class="glass-card bg-white dark:bg-zinc-900 p-10 md:p-12 rounded-[3rem] shadow-2xl border border-gray-100 dark:border-zinc-800 w-full">
                <div class="flex flex-col items-center mb-10">
                    <a href="index.html" class="flex items-center gap-2 group mb-6">
                        <i data-lucide="hexagon" class="w-8 h-8 text-honey-gold fill-honey-gold/20 group-hover:rotate-12 transition-transform"></i>
                        <span class="text-2xl font-bold playfair tracking-tight text-dark-brown dark:text-white">Bee<span class="text-honey-gold">Hive</span></span>
                    </a>
                    <h2 class="text-3xl font-bold playfair mb-2">Member Login</h2>
                    <p class="text-gray-500 text-sm">Access your sponsor dashboard and harvest updates.</p>
                </div>
                
                <form class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-gray-400">Email Address</label>
                        <input type="email" placeholder="name@email.com" class="w-full bg-gray-50 dark:bg-zinc-800 border border-transparent rounded-2xl py-4 px-6 focus:outline-none focus:bg-white dark:focus:bg-zinc-950 focus:border-honey-gold transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-gray-400">Password</label>
                        <div class="relative">
                            <input type="password" id="password" placeholder="••••••••" class="w-full bg-gray-50 dark:bg-zinc-800 border border-transparent rounded-2xl py-4 px-6 focus:outline-none focus:bg-white dark:focus:bg-zinc-950 focus:border-honey-gold transition-all">
                            <button type="button" class="password-toggle absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-honey-gold transition-colors">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between py-2">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-300 text-honey-gold focus:ring-honey-gold cursor-pointer">
                            <label for="remember" class="text-xs text-gray-500 cursor-pointer">Remember Me</label>
                        </div>
                        <a href="#" class="text-[10px] font-bold text-honey-gold uppercase hover:underline">Forgot Password?</a>
                    </div>
                    <button class="w-full py-5 bg-forest-green text-white rounded-full font-bold text-lg shadow-xl hover:bg-honey-gold transition-all active:scale-95">Login Now</button>

                    <div class="relative flex items-center gap-4 my-8">
                        <div class="flex-grow h-px bg-gray-100 dark:bg-zinc-800"></div>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Or continue with</span>
                        <div class="flex-grow h-px bg-gray-100 dark:bg-zinc-800"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <button type="button" class="flex items-center justify-center gap-3 py-3 border border-gray-200 dark:border-zinc-800 rounded-2xl hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
                            <svg class="w-5 h-5" viewBox="0 0 24 24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            <span class="text-sm font-bold">Google</span>
                        </button>
                        <button type="button" class="flex items-center justify-center gap-3 py-3 border border-gray-200 dark:border-zinc-800 rounded-2xl hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
                            <i data-lucide="apple" class="w-5 h-5"></i>
                            <span class="text-sm font-bold">Apple</span>
                        </button>
                    </div>
                </form>

                <div class="mt-10 text-center">
                    <p class="text-sm text-gray-500">Not a sponsor yet? <a href="signup.html" class="text-honey-gold font-bold">Create an account</a></p>
                </div>
            </div>
        </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
